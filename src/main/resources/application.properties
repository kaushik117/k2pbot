spring.application.name=generic-chatbot-platform
server.port=8080

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

spring.datasource.url=jdbc:postgresql://localhost:5432/chatbot
spring.datasource.username=postgres
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
spring.liquibase.enabled=true

logging.level.root=INFO
logging.level.com.yourcompany.ai.chatbot=DEBUG

app.feature.config-layer.enabled=true
app.config.cache.max-size=500
app.config.cache.ttl-minutes=30
app.feature.orchestration.enabled=false
app.feature.prompt-layer.enabled=true
app.feature.model-routing.enabled=true
app.feature.memory.enabled=true
app.feature.rag.enabled=false
app.feature.tools.enabled=false
